site_name: Kindly iOS SDK
site_url: https://kindly-ai.github.io/sdk-chat-ios/
site_description: Documentation for the Kindly Chat SDK for iOS
site_author: Kindly

docs_dir: docs_src
site_dir: docs

repo_url: https://github.com/kindly-ai/sdk-chat-ios
repo_name: kindly-ai/sdk-chat-ios

theme:
  name: material
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  custom_dir: docs_src/overrides
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - navigation.indexes
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

nav:
  - Home: index.md
  - Getting Started:
    - Initialization: guides/initialization.md
    - Configuration: guides/config.md
  - Chat Lifecycle:
    - Launch Chat: guides/launch-chat.md
    - Close Chat: guides/close-chat.md
    - End Chat: guides/end-chat.md
    - Kill SDK: guides/kill-sdk.md
  - Features:
    - Events: guides/events.md
    - Authentication: guides/authentication.md
    - Context: guides/context.md
    - Trigger Dialogue: guides/trigger-dialogue.md
    - Notification Support: guides/notification-support.md
  - Customization:
    - Custom Theming: guides/custom-theming.md
    - URL Schemes: guides/url-schemes.md
    - Link Interception: guides/link-interception.md
  - API Reference: api-reference/index.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - tables

plugins:
  - search

extra_css:
  - stylesheets/extra.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kindly-ai
    - icon: fontawesome/solid/globe
      link: https://www.kindly.ai
